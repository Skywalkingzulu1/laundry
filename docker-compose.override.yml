version: "3.8"

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENV=production
    depends_on:
      - db
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
      restart_policy:
        condition: on-failure

  worker:
    build: .
    command: ["python", "-m", "app.worker"]   # Placeholder – replace with actual worker entrypoint
    environment:
      - ENV=production
    depends_on:
      - db
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
      restart_policy:
        condition: on-failure

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: laundry
      POSTGRES_PASSWORD: laundrypass
      POSTGRES_DB: laundrydb
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"

volumes:
  db_data: