apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: laundrypool-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - laundrypool.example.com
      secretName: laundrypool-tls
  rules:
    - host: laundrypool.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: laundrypool-service
                port:
                  number: 443